<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTED — Hyperlocal</title>
<style>
  :root{
    --green:#1CE783;--green-dim:rgba(28,231,131,0.1);--green-dim2:rgba(28,231,131,0.18);
    --bg:#0B0C0F;--card:#18181b;--card2:#1f1f23;--border:#27272a;--text:#f4f4f5;--muted:#a1a1aa;--muted2:#71717a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  #app{max-width:420px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;border-left:1px solid #27272a;border-right:1px solid #27272a;overflow-x:hidden;}
  .hide{display:none!important;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;}

  .topbar{position:sticky;top:0;z-index:40;background:rgba(11,12,15,0.97);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);}
  .topbar-row{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-weight:900;font-size:20px;letter-spacing:-0.5px;display:flex;align-items:center;gap:6px;}
  .logo span.g{color:var(--green);}
  .badge-hyper{background:#27272a;color:#d4d4d8;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;}
  .loc-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#d4d4d8;background:rgba(39,39,42,0.8);padding:6px 10px;border-radius:999px;max-width:130px;}
  .loc-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bell-btn{position:relative;padding:6px;border-radius:999px;background:rgba(39,39,42,0.8);}
  .bell-dot{position:absolute;top:-2px;right:-2px;width:15px;height:15px;background:var(--green);color:#000;font-size:9px;font-weight:800;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .pulse-dot{width:6px;height:6px;border-radius:999px;background:var(--green);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .content{padding-bottom:90px;min-height:60vh;}
  .section{padding:16px;}
  .section+.section{padding-top:0;}

  .search-wrap{position:relative;margin:12px 16px;}
  .search-wrap input{width:100%;background:#18181b;border:1px solid var(--border);border-radius:12px;padding:12px 14px 12px 36px;font-size:12px;color:#fff;}
  .search-wrap input::placeholder{color:var(--muted2);}
  .search-icon{position:absolute;left:12px;top:13px;color:var(--muted2);}

  .hero{border-radius:16px;padding:20px;color:#000;background:linear-gradient(120deg,var(--green),#0FCE74);position:relative;overflow:hidden;}
  .hero .tag{background:rgba(0,0,0,0.15);font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;}
  .hero h2{font-size:18px;font-weight:900;margin:6px 0 4px;}
  .hero p{font-size:11px;font-weight:600;opacity:.85;line-height:1.5;margin:0;}

  .section-title{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .cat-card{background:var(--card);border:2px solid var(--green-dim);border-radius:16px;padding:16px;text-align:left;transition:.15s;}
  .cat-card:active{transform:scale(0.98);}
  .cat-card .icon{background:var(--green-dim2);color:var(--green);width:fit-content;padding:10px;border-radius:12px;margin-bottom:30px;}
  .cat-card .ov{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;display:block;}
  .cat-card h4{font-size:15px;font-weight:900;margin:2px 0;color:#fff;}
  .cat-card p{font-size:10px;color:var(--muted2);margin:0;}

  .biz-feature{position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;cursor:pointer;}
  .biz-feature .cover{height:112px;position:relative;overflow:hidden;}
  .biz-feature .cover img{width:100%;height:100%;object-fit:cover;}
  .feat-tag{position:absolute;top:8px;left:8px;background:var(--green);color:#000;font-size:9px;font-weight:800;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;}
  .feat-meta{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;}
  .biz-feature .body{padding:14px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .biz-feature h4{font-size:13px;font-weight:800;margin:0 0 4px;color:#fff;}
  .biz-feature p{font-size:11px;color:var(--muted);margin:0;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cat-pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;border:1px solid rgba(28,231,131,0.2);background:var(--green-dim);color:var(--green);text-transform:uppercase;}
  .rate-box{background:#27272a;border:1px solid #3f3f46;border-radius:8px;padding:4px 6px;text-align:center;min-width:42px;flex-shrink:0;}
  .rate-box .num{font-size:12px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;gap:2px;}
  .rate-box .cnt{font-size:8px;color:var(--muted2);font-weight:600;}

  .biz-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;}
  .biz-row .thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;background:#27272a;flex-shrink:0;}
  .biz-row .thumb img{width:100%;height:100%;object-fit:cover;}
  .biz-row .info{flex:1;min-width:0;}
  .biz-row h4{font-size:12px;font-weight:700;margin:0;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .biz-row .sub{font-size:10px;color:var(--muted2);margin:2px 0 0;}
  .status-open{color:var(--green);font-size:9px;font-weight:700;}
  .star-rate{display:flex;align-items:center;gap:2px;font-size:12px;font-weight:800;color:#fff;background:#27272a;border:1px solid #3f3f46;border-radius:8px;padding:5px 7px;}

  .profile-cover{position:relative;height:192px;background:#18181b;}
  .profile-cover img{width:100%;height:100%;object-fit:cover;opacity:.8;}
  .cover-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);}
  .cover-top{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;}
  .circle-btn{padding:8px;border-radius:999px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);color:#fff;}
  .cover-bottom{position:absolute;bottom:14px;left:14px;right:14px;}
  .cover-bottom .tag{background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);font-size:8px;font-weight:800;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em;}
  .cover-bottom h2{font-size:18px;font-weight:900;margin:4px 0 2px;display:flex;align-items:center;gap:6px;}
  .cover-bottom p{font-size:10px;color:#d4d4d8;margin:0;}
  .info-strip{padding:14px;background:rgba(24,24,27,.6);border-bottom:1px solid var(--border);font-size:11px;color:#d4d4d8;display:flex;flex-direction:column;gap:8px;}
  .info-strip .row{display:flex;align-items:center;gap:8px;}

  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;}
  .item-card.hl{border-color:var(--green);}
  .item-img{width:100%;height:80px;border-radius:10px;overflow:hidden;background:#27272a;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
  .item-img img{width:100%;height:100%;object-fit:cover;}
  .item-card h4{font-size:11px;font-weight:700;margin:0;color:#f4f4f5;line-height:1.3;}
  .item-card .price{font-size:12px;font-weight:900;color:#fff;display:block;margin-top:4px;}
  .item-foot{margin-top:12px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .stock-txt{font-size:8px;color:var(--muted2);font-weight:700;text-transform:uppercase;}
  .qty-box{display:flex;align-items:center;gap:4px;background:#27272a;border-radius:8px;padding:2px;}
  .qty-box button{padding:4px;border-radius:6px;background:#18181b;color:#e4e4e7;}
  .qty-box span{font-size:11px;font-weight:800;padding:0 4px;color:#fff;}

  .svc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px;}
  .svc-card.hl{border-color:var(--green);}
  .svc-thumb{width:60px;height:60px;border-radius:10px;overflow:hidden;background:#27272a;flex-shrink:0;}
  .svc-thumb img{width:100%;height:100%;object-fit:cover;}
  .svc-card h4{font-size:12px;font-weight:800;margin:0 0 3px;color:#fff;}
  .svc-card p{font-size:10px;color:var(--muted2);margin:0;line-height:1.4;}
  .svc-meta{display:flex;gap:6px;align-items:center;margin-top:6px;}
  .dur-pill{background:#27272a;color:#d4d4d8;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;}
  .svc-price{font-size:12px;font-weight:900;color:var(--green);}
  .book-btn{padding:9px 14px;border-radius:10px;background:var(--green);color:#000;font-size:11px;font-weight:800;flex-shrink:0;}

  .sticky-cart{position:sticky;bottom:0;z-index:20;background:var(--bg);border-top:1px solid var(--border);padding:14px;display:flex;justify-content:space-between;align-items:center;}
  .sticky-cart .lbl{font-size:9px;color:var(--muted2);font-weight:600;display:block;}
  .sticky-cart .amt{font-size:16px;font-weight:900;color:#fff;}
  .reserve-btn{background:var(--green);color:#000;font-weight:800;font-size:11px;padding:11px 18px;border-radius:12px;display:flex;align-items:center;gap:6px;}

  .review-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:11px;margin-bottom:8px;}
  .review-box .top{display:flex;justify-content:space-between;margin-bottom:4px;}
  .review-box .top strong{color:#f4f4f5;}
  .review-box p{margin:0;color:var(--muted);line-height:1.5;font-weight:500;}
  .stars{color:#fbbf24;display:flex;gap:1px;}

  .btn-green{background:var(--green);color:#000;font-weight:800;border-radius:10px;padding:10px;font-size:12px;}
  .btn-ghost{background:#27272a;color:#d4d4d8;font-weight:700;border-radius:10px;padding:9px 12px;font-size:11px;}
  textarea,.form-input{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:10px;padding:10px;font-size:11px;color:#fff;}
  textarea::placeholder,.form-input::placeholder{color:var(--muted2);}
  label.flbl{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted2);font-size:12px;}

  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:60;width:90%;max-width:380px;}
  .toast-inner{padding:14px;border-radius:12px;background:#18181b;border:1px solid rgba(28,231,131,0.4);color:var(--green);display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .toast-inner.warn{border-color:rgba(245,158,11,0.4);color:#fbbf24;}
  .toast-inner.err{border-color:rgba(244,63,94,0.4);color:#fb7185;}
  .toast-inner.info{border-color:rgba(59,130,246,0.4);color:#60a5fa;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(3px);z-index:50;display:flex;left:50%;transform:translateX(-50%);width:100%;max-width:420px;}
  .overlay.center{align-items:center;justify-content:center;padding:16px;}
  .overlay.bottom{align-items:flex-end;justify-content:center;}
  .modal-box{background:#18181b;border:1px solid var(--border);border-radius:18px;padding:20px;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;}
  .drawer-box{background:var(--bg);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:420px;margin:0 auto;max-height:85vh;overflow-y:auto;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-head h3{font-size:14px;font-weight:800;margin:0;color:#fff;}
  .x-btn{padding:5px;border-radius:999px;background:#27272a;color:#d4d4d8;}
  .loc-item{padding:10px;border-radius:10px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:#e4e4e7;width:100%;text-align:left;}
  .loc-item.active{color:var(--green);background:var(--green-dim);}

  .upload-box{display:flex;align-items:center;justify-content:center;width:100%;height:96px;border-radius:12px;border:2px dashed #3f3f46;background:rgba(39,39,42,0.6);overflow:hidden;position:relative;cursor:pointer;}
  .upload-box img{width:100%;height:100%;object-fit:cover;}
  .upload-box span{font-size:11px;color:var(--muted2);font-weight:600;}
  .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .remove-photo{font-size:10px;font-weight:700;color:#fb7185;margin-top:5px;display:inline-block;cursor:pointer;}

  .bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--bg);border-top:1px solid var(--border);padding:8px 14px;display:flex;justify-content:space-around;align-items:center;z-index:40;box-shadow:0 -4px 20px rgba(0,0,0,0.8);}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;color:#71717a;position:relative;}
  .nav-btn.active{color:var(--green);}
  .nav-btn span{font-size:9px;font-weight:700;}
  .nav-badge{position:absolute;top:-2px;right:0;width:15px;height:15px;background:var(--green);color:#000;font-size:8px;font-weight:800;border-radius:999px;display:flex;align-items:center;justify-content:center;}

  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center;}
  .stat-card .lbl{font-size:9px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block;}
  .stat-card .val{font-size:22px;font-weight:900;color:#fff;display:block;margin-top:4px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
  .panel-title{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .verify-panel{padding:16px;border-radius:16px;background:var(--green-dim);border:1px solid rgba(28,231,131,0.2);margin-bottom:16px;}
  .catalog-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:11px;}
  .catalog-row:last-child{border-bottom:none;}
  .order-card{padding:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;font-size:11px;}
  .order-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .pill{font-size:9px;font-weight:700;padding:4px 9px;border-radius:999px;}
  .pill.amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .pill.blue{background:rgba(59,130,246,0.15);color:#60a5fa;}
  .pill.indigo{background:rgba(99,102,241,0.15);color:#818cf8;}
  .pill.green{background:var(--green-dim2);color:var(--green);}
  .pill.gray{background:#27272a;color:#a1a1aa;}
  .pill.rose{background:rgba(244,63,94,0.15);color:#fb7185;}
  .item-summary{background:rgba(39,39,42,0.6);padding:8px;border-radius:10px;font-size:11px;}
  .item-summary .li{display:flex;justify-content:space-between;color:#d4d4d8;padding:2px 0;}
  .code-box{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:10px;background:var(--green-dim);border:1px solid rgba(28,231,131,0.2);margin-top:10px;}
  .code-box code{font-size:15px;font-weight:900;color:#fff;font-family:monospace;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:#27272a;border:1px solid #3f3f46;border-radius:999px;padding:5px 6px 5px 10px;font-size:10px;font-weight:700;color:#e4e4e7;margin:0 6px 6px 0;}
  .chip button{padding:2px;border-radius:999px;color:#a1a1aa;}
  .badge-vip{font-size:8px;font-weight:800;padding:1px 5px;border-radius:5px;background:var(--green-dim2);color:var(--green);}
  .flex-gap{display:flex;gap:8px;}
  .grow{flex:1;}
  .small-muted{font-size:10px;color:var(--muted2);}

  .notif-badge{position:absolute;top:-4px;right:-4px;width:8px;height:8px;background:#fb7185;border-radius:999px;border:2px solid var(--bg);}
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, collection, getDocs
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKFsg2T9BwL1w7zu4pOVm6aQUPYkvOG-Y",
    authDomain: "sorted004.firebaseapp.com",
    projectId: "sorted004",
    storageBucket: "sorted004.firebasestorage.app",
    messagingSenderId: "9195734262",
    appId: "1:9195734262:web:6655a03f0ca114b97598d7",
    measurementId: "G-G7M77ZK5J6"
  };

  const fbApp = initializeApp(firebaseConfig);
  analyticsSupported().then(ok=>{ if(ok) getAnalytics(fbApp); }).catch(()=>{});
  const auth = getAuth(fbApp);
  const firestore = getFirestore(fbApp);

  // Expose a small bridge so the classic (non-module) app script below
  // can talk to Firebase Auth + Firestore.
  window.fb = {
    ready: true,
    auth, firestore,
    createUser: (email, password) => createUserWithEmailAndPassword(auth, email, password),
    signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
    signOutUser: () => signOut(auth),
    onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),
    getUserDoc: (uid) => getDoc(doc(firestore, 'users', uid)),
    setUserDoc: (uid, data) => setDoc(doc(firestore, 'users', uid), data, { merge: true }),
    getAllUsers: async () => {
      const snap = await getDocs(collection(firestore, 'users'));
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    },
    getAppState: () => getDoc(doc(firestore, 'appState', 'main')),
    setAppState: (data) => setDoc(doc(firestore, 'appState', 'main'), data, { merge: true })
  };
  window.dispatchEvent(new Event('fb-ready'));
</script>

function switchAuthScreen(s){st.authScreen=s;st.authError='';render();}

function fbReady(){
  if(window.fb&&window.fb.ready) return true;
  st.authError='Connecting to server, please try again in a second…';
  render();
  return false;
}

async function handleSignup(){
  const f=st.authForm;
  if(!f.name.trim()||!f.email.trim()||!f.password.trim()||!f.mobile.trim()){st.authError='Please fill in all fields.';render();return;}
  if(!fbReady())return;
  if(f.password.length<6){st.authError='Password must be at least 6 characters.';render();return;}
  st.authBusy=true;render();
  try{
    const cred=await window.fb.createUser(f.email.trim(),f.password);
    const profile={name:f.name,email:f.email,mobile:f.mobile,role:st.authRole};
    await window.fb.setUserDoc(cred.user.uid,profile);
    const user={id:cred.user.uid,...profile};
    db.users.push(user);
    st.authBusy=false;
    loginUser(user);
  }catch(err){
    st.authBusy=false;
    st.authError=friendlyAuthError(err);
    render();
  }
}

const ADMIN_EMAIL='admin@sorted.app';
const ADMIN_PASSWORD='Sorted@Admin2026';

async function handleLogin(){
  const f=st.loginForm;
  if(!f.email.trim()||!f.password.trim()){st.authError='Please enter email and password.';render();return;}
  if(f.email.trim().toLowerCase()===ADMIN_EMAIL&&f.password===ADMIN_PASSWORD){
    loginUser({id:'admin_local',name:'Admin',email:ADMIN_EMAIL,mobile:'',role:'admin'});
    return;
  }
  if(!fbReady())return;
  st.authBusy=true;render();
  try{
    const cred=await window.fb.signIn(f.email.trim(),f.password);
    const snap=await window.fb.getUserDoc(cred.user.uid);
    if(!snap.exists()){st.authBusy=false;st.authError='No profile found for this account.';render();return;}
    const profile=snap.data();
    const user={id:cred.user.uid,...profile};
    if(!db.users.some(u=>u.id===user.id)) db.users.push(user);
    st.authBusy=false;
    loginUser(user);
  }catch(err){
    st.authBusy=false;
    st.authError=friendlyAuthError(err);
    render();
  }
}

function friendlyAuthError(err){
  const c=err&&err.code||'';
  if(c.includes('email-already-in-use'))return'Email already registered. Please log in.';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found'))return'Invalid email or password.';
  if(c.includes('invalid-email'))return'Please enter a valid email address.';
  if(c.includes('weak-password'))return'Password must be at least 6 characters.';
  if(c.includes('network-request-failed'))return'Network error. Check your connection and try again.';
  return'Something went wrong. Please try again.';
}

function loginUser(user){
  st.authError='';
  if(user.role==='customer'){
    if(!sessions.customer||sessions.customer.user.email!==user.email){
      sessions.customer={user,cart:{},cartFulfillment:{},favorites:[],savedAddresses:[],deliveryAddress:{address:'',phone:'',notes:''},payoutDetails:{bankName:'',accountNumber:'',upiId:''},notifyEnabled:true};
    }
    st.view='customer'; st.cTab='home';
  } else if(user.role==='owner'){
    if(!sessions.owner||sessions.owner.user.email!==user.email){
      const myBiz=db.businesses.filter(b=>b.ownerEmail===user.email);
      sessions.owner={user,activeBizId:myBiz.length?myBiz[0].id:null};
    }
    st.view='owner'; st.oTab='dashboard';
  } else {
    sessions.admin={user};
    st.view='admin';
  }
  st.authForm={name:'',email:'',password:'',mobile:''};
  st.loginForm={email:'',password:''};
  toast(`Welcome${user.role==='customer'?'':' back'}, ${user.name.split(' ')[0]}!`);
  render();
}

function logout(){

}

/* ── CUSTOMER ACTIONS ── */
function isFav(id){return (cSession()?.favorites||[]).some(f=>f.id===id);}
function toggleFav(id,type,name){
  const s=cSession();if(!s)return;
  if(isFav(id)){s.favorites=s.favorites.filter(f=>f.id!==id);toast(`Removed from favorites`,'info');}
  else{s.favorites.push({id,type,name});toast(`Added to favorites`);}
  render();
}
function qtyChange(bizId,itemId,delta,maxStock){
  const s=cSession();if(!s)return;
  if(!s.cart[bizId]) s.cart[bizId]={};
  const cur=s.cart[bizId][itemId]||0;
  const next=Math.max(0,cur+delta);
  if(maxStock!==undefined&&next>maxStock){toast(`Only ${maxStock} in stock`,'warning');return;}
  if(next===0) delete s.cart[bizId][itemId]; else s.cart[bizId][itemId]=next;
  if(Object.keys(s.cart[bizId]).length===0) delete s.cart[bizId];
  render();
}
function setFulfillment(bizId,mode){
  const s=cSession();if(!s)return;
  s.cartFulfillment[bizId]=mode;render();
}
function checkout(){
  const s=cSession();if(!s)return;
  const ids=Object.keys(s.cart).filter(id=>Object.keys(s.cart[id]||{}).length>0);
  if(!ids.length){toast('Cart is empty','warning');return;}
  const needAddr=ids.some(bid=>{const b=getBiz(bid);return b&&b.deliveryEnabled&&s.cartFulfillment[bid]==='delivery';});
  if(needAddr&&(!s.deliveryAddress.address.trim()||!s.deliveryAddress.phone.trim())){toast('Enter delivery address & phone','error');return;}
  ids.forEach(bid=>placeOrder(bid));
  toast(`Order${ids.length>1?'s':''} placed!`);
  st.cTab='orders';
  render();
}
function placeOrder(bizId){
  const s=cSession();
  const biz=getBiz(bizId);
  if(!biz||!s.cart[bizId]) return;
  const items=[];let subtotal=0;
  biz.items.forEach(item=>{
    const qty=s.cart[bizId][item.id];
    if(qty){items.push({id:item.id,name:item.name,price:item.price,qty,image:item.image});subtotal+=item.price*qty;}
  });
  if(!items.length) return;
  const fulfillment=(biz.deliveryEnabled&&s.cartFulfillment[bizId]==='delivery')?'delivery':'pickup';
  const deliveryFee=fulfillment==='delivery'?(biz.deliveryFee||0):0;
  const total=subtotal+deliveryFee;
  const code='SRT-'+Math.random().toString(36).slice(2,8).toUpperCase();
  const res={
    id:uid(),bizId,bizName:biz.name,customerName:s.user.name,customerEmail:s.user.email,
    items,subtotal,deliveryFee,total,code,status:'Pending',timestamp:Date.now(),
    fulfillment,
    deliveryAddress:fulfillment==='delivery'?{...s.deliveryAddress}:null
  };
  db.reservations.unshift(res);
  // update stock
  biz.items.forEach(item=>{if(s.cart[bizId]?.[item.id]) item.stock=Math.max(0,item.stock-s.cart[bizId][item.id]);});
  delete s.cart[bizId];
  delete s.cartFulfillment[bizId];
  // INSTANT notification to owner
  pushNotif(biz.ownerEmail,
    fulfillment==='delivery'?'🚚 New Delivery Order!':'📦 New Pickup Order!',
    `${res.customerName} ordered ${items.length} item${items.length>1?'s':''} — ₹${total} — Code: ${code}`
  );
  // notify customer

/* ── FIRESTORE SYNC ── */
let _saveTimer=null;
function scheduleCloudSave(){
  if(!(window.fb&&window.fb.ready))return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const payload={
      businesses:db.businesses,
      reservations:db.reservations,
      bookings:db.bookings,
      reviews:db.reviews,
      notifications:db.notifications
    };
    window.fb.setAppState(payload).catch(e=>console.warn('Cloud save failed:',e));
  },1200);
}

function render(){
  const a=document.getElementById('app');
  // re-focus
  const active=document.activeElement;
  let ff=null,ss=null,se=null;
  if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA')&&active.dataset.f){
    ff=active.dataset.f;ss=active.selectionStart;se=active.selectionEnd;
  }
  if(st.view==='auth'){a.innerHTML=renderAuth()+renderToast();return;}
  a.innerHTML=renderTopbar()+renderToast()+renderPageBody()+renderBottomNav()+renderModals();
  if(ff){const el=document.querySelector(`[data-f="${ff}"]`);if(el){el.focus();try{el.setSelectionRange(ss,se);}catch(e){}}}
  scheduleCloudSave();
}

function renderToast(){

  return `<div class="toast"><div class="toast-inner ${cls}">${t==='success'?I.checkC:I.alert} ${esc(st.notification.text)}</div></div>`;
}

    <div class="profile-cover">

      <div class="cover-bottom">
        <span class="tag">${esc(b.category)} • ${b.type.toUpperCase()}</span>

            <h4>${esc(item.name)}</h4>

function renderSearch(){
  const q=st.cSearchTerm.toLowerCase().trim();
  const bizsMatch=[],prodsMatch=[],svcsMatch=[];
  if(q){
    db.businesses.forEach(b=>{
      if(b.name.toLowerCase().includes(q)||b.description.toLowerCase().includes(q)||b.category.toLowerCase().includes(q)) bizsMatch.push(b);
      b.items.forEach(item=>{
        if(item.name.toLowerCase().includes(q)){
          if(b.type==='products') prodsMatch.push({...item,biz:b}); else svcsMatch.push({...item,biz:b});
        }
      });
    });
  }
  return`<div class="section">
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="search-wrap" style="flex:1;margin:0;">
        <input type="text" data-f="search" placeholder="Search..." value="${esc(st.cSearchTerm)}" oninput="st.cSearchTerm=this.value;render()">
        <span class="search-icon">${I.search}</span>
      </div>
      <button onclick="st.cSearchTerm='';st.cTab='home';render()" style="font-size:11px;font-weight:700;color:var(--muted);">Back</button>
    </div>
    ${!q?`<div class="empty-state">Type to search across the hyperlocal network.</div>`:''}
    ${bizsMatch.length?`<div class="section-title">Businesses</div>${bizsMatch.map(b=>`<div class="biz-row" onclick="st.cBizId='${b.id}';st.cTab='home';render()">
      <span style="font-size:22px;">${b.type==='products'?'🛍️':'🛠️'}</span>
      <div class="info"><h4>${esc(b.name)}</h4><p class="sub">${esc(b.category)} • ${esc(b.distance)}</p></div>${I.chevron}
    </div>`).join('')}`:''}
    ${prodsMatch.length?`<div class="section-title">Products</div>${prodsMatch.map(p=>`<div class="biz-row" onclick="st.cBizId='${p.biz.id}';st.cHighlight='${p.id}';st.cTab='home';render()">
      <span style="font-size:18px;">${p.image||'📦'}</span>
      <div class="info"><h4>${esc(p.name)}</h4><p class="sub">at <strong style="color:#d4d4d8;">${esc(p.biz.name)}</strong></p></div>
      <span style="font-weight:800;color:${HULU};font-size:12px;">₹${p.price}</span>
    </div>`).join('')}`:''}
    ${svcsMatch.length?`<div class="section-title">Services</div>${svcsMatch.map(s=>`<div class="biz-row" onclick="st.cBizId='${s.biz.id}';st.cHighlight='${s.id}';st.cTab='home';render()">
      <span style="font-size:18px;">⚡</span>
      <div class="info"><h4>${esc(s.name)}</h4><p class="sub">by <strong style="color:#d4d4d8;">${esc(s.biz.name)}</strong></p></div>
      <div style="text-align:right;"><span style="font-weight:800;color:${HULU};font-size:12px;display:block;">₹${s.price}</span><span class="small-muted">${esc(s.duration)}</span></div>
    </div>`).join('')}`:''}
    ${q&&!bizsMatch.length&&!prodsMatch.length&&!svcsMatch.length?`<div class="empty-state">No results for "${esc(q)}"</div>`:''}
  </div>`;
}

function renderCart(){
  const s=cSession();
  if(!s) return`<div class="section"><div class="empty-state">Please log in to view cart.</div></div>`;
  const bizIds=Object.keys(s.cart).filter(id=>Object.keys(s.cart[id]||{}).length>0);
  let grand=0;
  const rows=bizIds.map(bid=>{
    const biz=getBiz(bid);if(!biz)return'';
    const bc=s.cart[bid];
    const fulfillment=(biz.deliveryEnabled&&s.cartFulfillment[bid]==='delivery')?'delivery':'pickup';
    let sub=0;
    const items=biz.items.filter(i=>bc[i.id]).map(item=>{
      const qty=bc[item.id];sub+=item.price*qty;
      return`<div class="catalog-row">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:16px;">${item.thumb?`<img src="${esc(item.thumb)}" style="width:26px;height:26px;object-fit:cover;border-radius:6px;">`:esc(item.image||'📦')}</span>
          <div><p style="font-weight:700;color:#f4f4f5;margin:0;font-size:11px;">${esc(item.name)}</p><span class="small-muted">₹${item.price} each</span></div>
        </div>
        <div class="qty-box">
          <button onclick="qtyChange('${bid}','${item.id}',-1,${item.stock+qty})">${I.minus}</button>
          <span>${qty}</span>
          <button onclick="qtyChange('${bid}','${item.id}',1,${item.stock+qty})">${I.plus}</button>
        </div>
      </div>`;
    }).join('');
    const fee=fulfillment==='delivery'?(biz.deliveryFee||0):0;
    grand+=sub+fee;
    return`<div class="panel" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <button onclick="st.cBizId='${bid}';render()" style="font-size:12px;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px;">${esc(biz.name)} ${I.chevron}</button>
        <span style="font-size:11px;font-weight:800;color:${HULU};">₹${sub+fee}</span>
      </div>
      ${items}
      ${biz.deliveryEnabled?`<div class="flex-gap" style="margin:10px 0 0;">
        <button onclick="setFulfillment('${bid}','pickup')" style="flex:1;padding:8px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid ${fulfillment==='pickup'?HULU:'#27272a'};background:${fulfillment==='pickup'?'var(--green-dim2)':'#27272a'};color:${fulfillment==='pickup'?HULU:'#d4d4d8'};">Self Pickup</button>
        <button onclick="setFulfillment('${bid}','delivery')" style="flex:1;padding:8px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid ${fulfillment==='delivery'?HULU:'#27272a'};background:${fulfillment==='delivery'?'var(--green-dim2)':'#27272a'};color:${fulfillment==='delivery'?HULU:'#d4d4d8'};">Delivery +₹${biz.deliveryFee}</button>
      </div>`:`<div class="small-muted" style="margin-top:8px;font-weight:600;">Self-pickup only</div>`}
    </div>`;
  }).join('');
  const needAddr=bizIds.some(bid=>{const b=getBiz(bid);return b&&b.deliveryEnabled&&s.cartFulfillment[bid]==='delivery';});
  return`<div class="section">
    <h2 style="font-size:18px;font-weight:900;color:#fff;margin:0 0 14px;">My Cart</h2>
    ${!bizIds.length?`<div class="empty-state">${I.bag}<br><br>Cart is empty. Browse and tap + to add items.</div>`:`
    ${rows}
    ${s.savedAddresses.length&&needAddr?`<div class="panel"><div class="panel-title" style="margin-bottom:8px;">Saved Addresses</div>${s.savedAddresses.map(a=>`<button class="loc-item" onclick="useSavedAddress('${a.id}')">${esc(a.label)} — ${esc(a.address).slice(0,30)}...${I.chevron}</button>`).join('')}</div>`:''}
    ${needAddr?`<div class="panel">
      <div class="panel-title" style="margin-bottom:10px;">${I.pin} Delivery Address</div>
      <div class="field"><label class="flbl">Full Address *</label><textarea rows="2" data-f="d-addr" placeholder="House, Street, Landmark, PIN" oninput="cSession().deliveryAddress.address=this.value">${esc(s.deliveryAddress.address)}</textarea></div>
      <div class="field"><label class="flbl">Contact Phone *</label><input class="form-input" data-f="d-phone" placeholder="+91 90000 00000" value="${esc(s.deliveryAddress.phone)}" oninput="cSession().deliveryAddress.phone=this.value"></div>
      <div class="field" style="margin-bottom:0;"><label class="flbl">Notes</label><input class="form-input" data-f="d-notes" placeholder="e.g. Ring bell twice" value="${esc(s.deliveryAddress.notes)}" oninput="cSession().deliveryAddress.notes=this.value"></div>
    </div>`:''}
    <div class="panel" style="margin-bottom:0;">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:900;color:#fff;margin-bottom:12px;"><span>Total</span><span>₹${grand}</span></div>
      <button class="btn-green" style="width:100%;" onclick="checkout()">Place Order</button>
    </div>`}
  </div>`;
}

function renderOwner(){
  const s=oSession();if(!s)return'';
  const ob=activeBiz();
  const myBiz=myBizList();
  if(st.oTab==='dashboard') return renderOwnerDashboard(ob,myBiz,s);
  if(st.oTab==='verify') return renderOwnerVerify(ob,s);
  if(st.oTab==='orders') return renderOwnerOrders(ob,s);
  if(st.oTab==='profile') return renderOwnerProfile(s,myBiz);
  return'';
}

function renderOwnerDashboard(ob,myBiz,s){
  const myRes=db.reservations.filter(r=>myBiz.some(b=>b.id===r.bizId));
  const myBook=db.bookings.filter(b=>myBiz.some(bz=>bz.id===b.bizId));
  const rev=myRes.filter(r=>['Picked Up','Delivered'].includes(r.status)).reduce((sum,r)=>sum+r.total,0)
           +myBook.filter(b=>b.status==='Completed').reduce((sum,b)=>sum+b.price,0);
  return`<div class="section">

      <button class="nav-btn ${st.oTab==='verify'?'active':''}" onclick="st.oTab='verify';render()">${I.checkC}<span>Verify</span></button>
      <button class="nav-btn ${st.oTab==='profile'?'active':''}" onclick="st.oTab='profile';render()">${I.shield}<span>Profile</span></button>
    </div>`;
  }
  if(st.view==='admin'){
    return`<div class="bottomnav">
      <button class="nav-btn active">${I.shield}<span>Admin</span></button>
    </div>`;
  }
  return'';
}

/* ── BOOT ── */
async function loadCloudState(){
  if(!(window.fb&&window.fb.ready))return;
  try{
    const snap=await window.fb.getAppState();
    if(snap.exists()){
      const d=snap.data();
      if(d.businesses&&d.businesses.length) db.businesses=d.businesses;
      if(d.reservations) db.reservations=d.reservations;
      if(d.bookings) db.bookings=d.bookings;
      if(d.reviews) db.reviews=d.reviews;
      if(d.notifications) db.notifications=d.notifications;
    }
  }catch(e){console.warn('Cloud load failed:',e);}
}

async function restoreSession(fbUser){
  try{
    const snap=await window.fb.getUserDoc(fbUser.uid);
    if(!snap.exists())return;
    const profile=snap.data();
    const user={id:fbUser.uid,...profile};
    if(!db.users.some(u=>u.id===user.id)) db.users.push(user);
    loginUser(user);
  }catch(e){console.warn('Session restore failed:',e);}
}

function boot(){
  if(window.fb&&window.fb.ready){
    loadCloudState().then(()=>{
      window.fb.onAuthStateChanged(fbUser=>{
        if(fbUser&&st.view==='auth') restoreSession(fbUser);
      });
      render();
    });
  }
}

render(); // always render immediately — never block the UI on Firebase
if(window.fb&&window.fb.ready) boot();
else window.addEventListener('fb-ready',boot,{once:true});
// safety net: if Firebase never loads (blocked network, offline, etc.) the
// app still works fully offline using the in-memory seed data.
</script>
